name: Deploy CropFresh AI to AWS

on:
  workflow_run:
    workflows: ["CI — Lint + Test"]
    types: [completed]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: cropfresh-ai

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          docker build \
            -f infra/docker/api.Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image-uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy-backend:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    name: Deploy to App Runner
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or update App Runner service
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='cropfresh-ai'].ServiceArn" \
            --output text 2>/dev/null || echo "")

          ENV_VARS=$(cat <<'ENVJSON'
          {
            "ENVIRONMENT": "production",
            "LLM_PROVIDER": "groq",
            "GROQ_API_KEY": "${{ secrets.GROQ_API_KEY }}",
            "VECTOR_DB_PROVIDER": "qdrant",
            "QDRANT_HOST": "${{ secrets.QDRANT_HOST }}",
            "QDRANT_PORT": "6333",
            "QDRANT_API_KEY": "${{ secrets.QDRANT_API_KEY }}",
            "QDRANT_COLLECTION": "agri_knowledge",
            "REDIS_URL": "${{ secrets.REDIS_URL }}",
            "PG_HOST": "${{ secrets.PG_HOST }}",
            "PG_PASSWORD": "${{ secrets.PG_PASSWORD }}",
            "PG_DATABASE": "postgres",
            "PG_USER": "postgres",
            "JWT_SECRET": "${{ secrets.JWT_SECRET }}"
          }
          ENVJSON
          )

          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "Creating new App Runner service..."
            aws apprunner create-service \
              --service-name cropfresh-ai \
              --source-configuration "{
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"${IMAGE_URI}\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"8000\",
                    \"RuntimeEnvironmentVariables\": ${ENV_VARS}
                  }
                },
                \"AutoDeploymentsEnabled\": true,
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"arn:aws:iam::669640509011:role/cropfresh-apprunner-ecr-access\"
                }
              }" \
              --instance-configuration '{
                "Cpu": "2 vCPU",
                "Memory": "4 GB",
                "InstanceRoleArn": "arn:aws:iam::669640509011:role/cropfresh-app-runner-role"
              }' \
              --health-check-configuration '{
                "Protocol": "HTTP",
                "Path": "/health",
                "Interval": 20,
                "Timeout": 10,
                "HealthyThreshold": 1,
                "UnhealthyThreshold": 10
              }'
          else
            echo "Updating existing App Runner service..."
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration "{
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"${IMAGE_URI}\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"8000\",
                    \"RuntimeEnvironmentVariables\": ${ENV_VARS}
                  }
                },
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"arn:aws:iam::669640509011:role/cropfresh-apprunner-ecr-access\"
                }
              }"
          fi

      - name: Wait for deployment
        run: |
          echo "Waiting 90s for App Runner to deploy..."
          sleep 90
          SERVICE_URL=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='cropfresh-ai'].ServiceUrl" \
            --output text)
          echo "Service URL: https://${SERVICE_URL}"

          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${SERVICE_URL}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/20: status=$STATUS, retrying in 30s..."
            sleep 30
          done
          echo "Health check did not pass within 10 min (service may still be starting)"

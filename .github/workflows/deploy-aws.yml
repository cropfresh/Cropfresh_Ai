name: Deploy CropFresh AI to AWS

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "ai/**"
      - "infra/docker/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch: # manual trigger

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: cropfresh-ai

permissions:
  id-token: write
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker image to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f infra/docker/api.Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image-uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to App Runner
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy to App Runner
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or update App Runner service
        run: |
          SERVICE_EXISTS=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='cropfresh-ai'].ServiceArn" --output text 2>/dev/null || echo "")

          if [ -z "$SERVICE_EXISTS" ]; then
            echo "Creating new App Runner service..."
            aws apprunner create-service \
              --service-name cropfresh-ai \
              --source-configuration '{
                "ImageRepository": {
                  "ImageIdentifier": "${{ needs.build-and-push.outputs.image-uri }}",
                  "ImageRepositoryType": "ECR",
                  "ImageConfiguration": {
                    "Port": "8000",
                    "RuntimeEnvironmentVariables": {
                      "ENVIRONMENT": "production",
                      "LLM_PROVIDER": "groq"
                    }
                  }
                },
                "AutoDeploymentsEnabled": true,
                "AuthenticationConfiguration": {
                  "AccessRoleArn": "arn:aws:iam::669640509011:role/cropfresh-app-runner-role"
                }
              }' \
              --instance-configuration '{
                "Cpu": "1 vCPU",
                "Memory": "2 GB",
                "InstanceRoleArn": "arn:aws:iam::669640509011:role/cropfresh-app-runner-role"
              }' \
              --health-check-configuration '{
                "Protocol": "HTTP",
                "Path": "/health",
                "Interval": 10,
                "Timeout": 5,
                "HealthyThreshold": 1,
                "UnhealthyThreshold": 5
              }'
          else
            echo "Updating existing App Runner service..."
            aws apprunner update-service \
              --service-arn $SERVICE_EXISTS \
              --source-configuration '{
                "ImageRepository": {
                  "ImageIdentifier": "${{ needs.build-and-push.outputs.image-uri }}",
                  "ImageRepositoryType": "ECR",
                  "ImageConfiguration": {
                    "Port": "8000"
                  }
                },
                "AuthenticationConfiguration": {
                  "AccessRoleArn": "arn:aws:iam::669640509011:role/cropfresh-app-runner-role"
                }
              }'
          fi

      - name: Wait for deployment
        run: |
          echo "Waiting 60s for App Runner to start deploying..."
          sleep 60
          SERVICE_URL=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='cropfresh-ai'].ServiceUrl" --output text)
          echo "Service URL: https://${SERVICE_URL}"
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${SERVICE_URL}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 20s..."
            sleep 20
          done
          echo "⚠️ Health check did not pass (service may still be starting)"

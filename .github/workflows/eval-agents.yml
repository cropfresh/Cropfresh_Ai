name: Evaluate Agents

on:
  pull_request:
    paths: ['src/agents/**', 'ai/evals/**']

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v7.6.0
        with:
          python-version: "3.12"
      - run: uv sync --group dev --extra evaluation
      - run: uv run python ai/evals/run_evals.py

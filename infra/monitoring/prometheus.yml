global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "local"
    service: "cropfresh-ai"

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: "cropfresh-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "cropfresh-ai"

  - job_name: "qdrant"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: "qdrant"

  - job_name: "redis"
    static_configs:
      - targets: [] # Add redis_exporter sidecar if needed

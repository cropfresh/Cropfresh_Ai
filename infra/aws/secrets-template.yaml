# AWS Secrets Manager — CropFresh AI Secret Definitions
#
# Create each secret:
#   aws secretsmanager create-secret \
#     --name "cropfresh/prod/<key>" \
#     --description "<description>" \
#     --secret-string "<value>" \
#     --region ap-south-1
#
# Naming convention: cropfresh/{env}/{key}
# All secrets in region: ap-south-1
# ─────────────────────────────────────────────────────────────

secrets:
  # ── DATABASE ────────────────────────────────────────────────
  - name: cropfresh/prod/database_url
    description: "AWS RDS PostgreSQL connection string"
    example: "postgresql://cropfresh_user:{PASSWORD}@cropfresh-db.{ID}.ap-south-1.rds.amazonaws.com:5432/cropfresh_prod?sslmode=require"
    rotation: "Manual (via RDS console + update secret)"
    used_by: ["App Runner → FastAPI → SQLAlchemy"]

  - name: cropfresh/staging/database_url
    description: "Staging RDS connection string"

  # ── CACHE ────────────────────────────────────────────────────
  - name: cropfresh/prod/redis_url
    description: "Redis Cloud connection string (ap-south-1, port 13641)"
    example: "redis://:{PASSWORD}@redis-{ID}.ap-south-1.ec2.cloud.redislabs.com:13641"
    used_by: ["App Runner → AgentStateManager, BuyerMatchingAgent"]

  # ── LLM PROVIDERS ───────────────────────────────────────────
  - name: cropfresh/prod/groq_api_key
    description: "Groq API key — primary LLM provider"
    example: "gsk_..."
    used_by: ["App Runner → GroqProvider, SupervisorAgent, RAG pipeline"]

  - name: cropfresh/prod/together_api_key
    description: "Together AI API key — tertiary LLM fallback"
    used_by: ["App Runner → TogetherProvider"]
    note: "AWS Bedrock uses IAM role (cropfresh-app-runner-role) — no API key needed"

  # ── VECTOR DATABASE ──────────────────────────────────────────
  - name: cropfresh/prod/qdrant_api_key
    description: "Qdrant Cloud API key (EU-Central cluster)"
    used_by: ["App Runner → KnowledgeAgent, RAG retrieve_node"]

  - name: cropfresh/prod/qdrant_url
    description: "Qdrant Cloud cluster URL"
    example: "https://{cluster-id}.eu-central-1.aws.cloud.qdrant.io:6333"

  # ── GRAPH DATABASE ───────────────────────────────────────────
  - name: cropfresh/prod/neo4j_uri
    description: "Neo4j AuraDB bolt URI"
    example: "neo4j+s://93ac2928.databases.neo4j.io"
    used_by: ["App Runner → ResearchAgent, RAG Neo4j integration"]

  - name: cropfresh/prod/neo4j_password
    description: "Neo4j AuraDB password"

  # ── AUTH ─────────────────────────────────────────────────────
  - name: cropfresh/prod/jwt_secret_key
    description: "HMAC-SHA256 secret for JWT signing"
    rotation: "Every 90 days"
    note: "256-bit random string, never same as staging"
    used_by: ["App Runner → /auth/otp/verify JWT issuance"]

  - name: cropfresh/prod/sms_otp_api_key
    description: "SMS gateway API key for OTP delivery (MSG91 / Kaleyra / AWS SNS)"
    used_by: ["App Runner → RegistrationService → OTP send"]

  # ── OBSERVABILITY ────────────────────────────────────────────
  - name: cropfresh/prod/langsmith_api_key
    description: "LangSmith API key for LLM tracing (LANGCHAIN_API_KEY env var)"
    used_by: ["App Runner → all agents"]

  # ── EXTERNAL DATA ────────────────────────────────────────────
  - name: cropfresh/prod/agmarknet_session
    description: "Agmarknet scraping session cookie / credentials"
    used_by: ["App Runner → AgmarknetTool"]

# ── CI/CD GitHub Secrets (NOT stored in Secrets Manager) ──────
# Stored in GitHub repo settings → Actions secrets:
#   AWS_ROLE_ARN              → cropfresh-github-actions-role ARN
#   AWS_REGION                → ap-south-1
#   APP_RUNNER_SERVICE_ARN    → App Runner service ARN
#   CLOUDFRONT_DISTRIBUTION   → Distribution ID for web invalidation

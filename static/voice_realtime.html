<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CropFresh Voice Realtime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/theme.css">
  <link rel="stylesheet" href="./assets/css/voice-realtime.css">
</head>
<body>
  <div class="app-shell rt-layout">
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo">⚡</span>
        <div>
          <div class="brand-title">Live Streaming Chat</div>
          <div class="brand-subtitle">ChatGPT-style realtime token streaming using SSE</div>
        </div>
      </div>
      <div class="status-pill offline" id="wsStatusPill">
        <span class="dot"></span>
        <span data-status-text>Idle</span>
      </div>
    </header>

    <nav class="nav-links">
      <a href="./index.html" class="nav-link">🏠 Dashboard</a>
      <a href="./rag_test.html" class="nav-link">🧪 RAG Lab</a>
      <a href="./voice_agent.html" class="nav-link">🎙 Voice Agent</a>
      <a href="./voice_test_ui.html" class="nav-link">🎤 Voice UI</a>
      <a href="./voice_realtime.html" class="nav-link active">⚡ Realtime</a>
      <a href="/docs" target="_blank" class="nav-link">📘 Swagger</a>
    </nav>

    <article class="card">
      <h3 class="card-title">Streaming Conversation</h3>
      <p class="card-desc">Send a message and watch assistant tokens appear in real-time.</p>
      <div id="chatStream" class="chat-stream"></div>
      <div class="stream-metadata">
        <span id="streamAgent">Agent: —</span>
        <span id="streamSession">Session: —</span>
      </div>
      <label class="label" for="streamPrompt">Your message</label>
      <textarea id="streamPrompt" class="textarea" rows="3" placeholder="Ask anything...">What is the current tomato price and should I sell now?</textarea>
      <div class="chat-controls">
        <button id="btnSendStream" class="btn btn-primary">Send</button>
        <button id="btnStopStream" class="btn btn-secondary">Stop</button>
        <button id="btnClearStream" class="btn btn-secondary">Clear</button>
      </div>
    </article>
  </div>
  <script src="./assets/js/shared.js"></script>
  <script src="./assets/js/voice-realtime.js"></script>
</body>
</html>
